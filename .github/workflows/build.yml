name: build (macOS, HEAD)

# Compiles the formulae from the latest upstream commit on a real macOS runner.
# - push / pull_request: verify a formula edit still builds.
# - weekly cron: rebuild the current main tip, so a breaking upstream commit
#   surfaces here rather than at a user's `brew install --HEAD`.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC — rebuild latest HEAD

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        # xymon (server) and xymon-client conflict, so build each in its own
        # runner rather than installing both side by side.
        formula: [xymon, xymon-client]
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Register this checkout as a tap
        # tap name = repo with the "homebrew-" prefix stripped (bonomani/xymon);
        # `brew tap <name> <path>` registers the checked-out files as that tap,
        # so a PR tests the edited formula, not the pushed remote.
        run: brew tap "${GITHUB_REPOSITORY/homebrew-/}" "$PWD"

      - name: Build ${{ matrix.formula }} from latest commit (--HEAD)
        run: brew install --HEAD --build-from-source "${GITHUB_REPOSITORY/homebrew-/}/${{ matrix.formula }}"

      - name: Show what was installed
        run: brew list --verbose "${{ matrix.formula }}" || true
